name: Auto Tag & Release

on:
  push:
    branches: [production]

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    concurrency: production-tag
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set timezone to JST
        run: sudo ln -sf /usr/share/zoneinfo/Asia/Tokyo /etc/localtime

      - name: Calculate next version tag
        id: calc
        run: |
          today=$(date '+%Y%m%d')
          last_same_day=$(git tag -l "${today}.*" | sort -V | tail -n1)
          
          if [ -z "$last_same_day" ]; then
            next="${today}.0"
          else
            rev=${last_same_day##*.}
            next="${today}.$((rev+1))"
          fi
          
          echo "next_tag=$next" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev_tag
        run: |
          prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$prev_tag" >> $GITHUB_OUTPUT

      - name: Check if first automated release
        id: check_release
        run: |
          # Check if any releases exist (for first automated release notes)
          RELEASE_COUNT=$(gh release list --limit 1 --json tagName | jq length)
          echo "is_first_automated_release=$([ $RELEASE_COUNT -eq 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the merge commit that triggered this workflow
          CURRENT_SHA="${{ github.sha }}"
          
          # Check if this is the first automated release notes
          if [ "${{ steps.check_release.outputs.is_first_automated_release }}" = "true" ]; then
            # First automated release notes - create simple message to avoid overwhelming changelog
            cat << EOF > release_notes.md
          ## What's Changed
          
          First automated release notes. Previous changes are not included to keep this concise.
          
          **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ steps.calc.outputs.next_tag }}
          EOF
          else
            # Get PRs between tags
            if [ -z "${{ steps.prev_tag.outputs.prev_tag }}" ]; then
              # No previous tag but releases exist - get recent commits (last 50)
              COMMITS=$(git log --pretty=format:"%H" -50 $CURRENT_SHA)
            else
              # Get commits between previous tag and current
              COMMITS=$(git log --pretty=format:"%H" ${{ steps.prev_tag.outputs.prev_tag }}..$CURRENT_SHA)
            fi
            
            # Find PRs from commit messages
            PR_LIST=""
            SEEN_PRS=""
            
            # Function to add PR to list if not already seen
            add_pr_to_list() {
              local pr_num=$1
              local pr_title=$2
              local pr_author=$3
              
              # Skip if we've already seen this PR
              if [[ "$SEEN_PRS" =~ ":$pr_num:" ]]; then
                return
              fi
              
              # Add to seen list
              SEEN_PRS="${SEEN_PRS}:$pr_num:"
              
              # Add to PR list
              if [ -n "$PR_LIST" ]; then
                PR_LIST="${PR_LIST}"$'\n'"* $pr_title by @$pr_author"
              else
                PR_LIST="* $pr_title by @$pr_author"
              fi
            }
            
            for commit in $COMMITS; do
              # Check if this is a merge commit from a PR
              PR_NUM=$(git log -1 --pretty=format:"%s" $commit | grep -oE "Merge pull request #[0-9]+" | grep -oE "[0-9]+" || true)
              if [ -n "$PR_NUM" ]; then
                # Get PR details
                PR_INFO=$(gh pr view $PR_NUM --json number,title,author,mergeCommit 2>/dev/null || echo "")
                if [ -n "$PR_INFO" ]; then
                  PR_TITLE=$(echo "$PR_INFO" | jq -r '.title')
                  PR_AUTHOR=$(echo "$PR_INFO" | jq -r '.author.login')
                  
                  # Check if this is a Release PR
                  if [[ "$PR_TITLE" =~ ^Release\ to ]]; then
                    # For Release PRs, extract PRs merged into it
                    MERGE_COMMIT=$(echo "$PR_INFO" | jq -r '.mergeCommit.oid // empty')
                    if [ -n "$MERGE_COMMIT" ]; then
                      # Get the parent commits of the merge
                      PARENTS=$(git rev-parse $MERGE_COMMIT^@ 2>/dev/null || echo "")
                      if [ -n "$PARENTS" ]; then
                        # Get commits between the two parents (what was merged)
                        PARENT_ARRAY=($PARENTS)
                        if [ ${#PARENT_ARRAY[@]} -eq 2 ]; then
                          RELEASE_COMMITS=$(git log --pretty=format:"%H" ${PARENT_ARRAY[1]}..${PARENT_ARRAY[0]} 2>/dev/null || echo "")
                          
                          # Extract PRs from these commits
                          for release_commit in $RELEASE_COMMITS; do
                            INNER_PR_NUM=$(git log -1 --pretty=format:"%s" $release_commit | grep -oE "Merge pull request #[0-9]+" | grep -oE "[0-9]+" || true)
                            if [ -n "$INNER_PR_NUM" ]; then
                              INNER_PR_INFO=$(gh pr view $INNER_PR_NUM --json number,title,author 2>/dev/null || echo "")
                              if [ -n "$INNER_PR_INFO" ]; then
                                INNER_PR_TITLE=$(echo "$INNER_PR_INFO" | jq -r '.title')
                                INNER_PR_AUTHOR=$(echo "$INNER_PR_INFO" | jq -r '.author.login')
                                # Skip Release PRs even when found inside other Release PRs
                                if [[ ! "$INNER_PR_TITLE" =~ ^Release\ to ]]; then
                                  add_pr_to_list "$INNER_PR_NUM" "#$INNER_PR_NUM $INNER_PR_TITLE" "$INNER_PR_AUTHOR"
                                fi
                              fi
                            fi
                          done
                        fi
                      fi
                    fi
                  else
                    # For non-Release PRs, add them directly
                    add_pr_to_list "$PR_NUM" "#$PR_NUM $PR_TITLE" "$PR_AUTHOR"
                  fi
                fi
              fi
            done
            
            # Create release notes
            cat << EOF > release_notes.md
          ## What's Changed
          $PR_LIST
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.prev_tag.outputs.prev_tag }}...${{ steps.calc.outputs.next_tag }}
          EOF
          fi

      - name: Create and push tag
        run: |
          git tag "${{ steps.calc.outputs.next_tag }}"
          git push origin "${{ steps.calc.outputs.next_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calc.outputs.next_tag }}
          body_path: release_notes.md
          name: "${{ steps.calc.outputs.next_tag }}"
