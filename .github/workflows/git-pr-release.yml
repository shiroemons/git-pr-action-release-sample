name: Git PR Release

on:
  push:
    branches:
      - develop
      - staging

permissions:
  contents: read
  pull-requests: write

jobs:
  git-pr-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_PR_RELEASE_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install git-pr-release
        run: gem install --no-document git-pr-release

      - name: Create PR (develop -> staging)
        if: github.ref == 'refs/heads/develop'
        run: git-pr-release --no-fetch
        env:
          GIT_PR_RELEASE_TOKEN: ${{ secrets.GIT_PR_RELEASE_TOKEN }}
          GIT_PR_RELEASE_BRANCH_PRODUCTION: staging
          GIT_PR_RELEASE_BRANCH_STAGING: develop
          GIT_PR_RELEASE_TEMPLATE: ./.git-pr-release/staging.template
          TZ: Asia/Tokyo

      - name: Create PR (staging -> production)
        if: github.ref == 'refs/heads/staging'
        run: git-pr-release --no-fetch
        env:
          GIT_PR_RELEASE_TOKEN: ${{ secrets.GIT_PR_RELEASE_TOKEN }}
          GIT_PR_RELEASE_BRANCH_PRODUCTION: production
          GIT_PR_RELEASE_BRANCH_STAGING: staging
          GIT_PR_RELEASE_TEMPLATE: ./.git-pr-release/production.template
          TZ: Asia/Tokyo